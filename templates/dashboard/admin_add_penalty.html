{% extends "base.html" %}
{% block title %}벌점 등록{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">벌점 / 상점 등록</h1>
  <a href="{{ url_for('main.admin_dashboard') }}" class="btn btn-outline">← 돌아가기</a>
</div>
<div class="section-card" style="max-width:540px">
  <form method="POST" class="admin-form">
    <div class="form-group">
      <label>학생</label>
      <select name="student_id" required>
        <option value="">-- 선택 --</option>
        {% for s in students %}
        <option value="{{ s.id }}">{{ s.name }} ({{ s.student_id or s.email }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group"><label>일자</label><input type="date" name="date" value="{{ today }}" /></div>
    <div class="form-group">
      <label>구분</label>
      <select name="category">
        <option>생활규정</option><option>학업규정</option><option>생활불량</option>
        <option>봉사활동</option><option>기타</option>
      </select>
    </div>
    <div class="form-group"><label>사유</label><input type="text" name="reason" required /></div>
    <div class="form-row">
      <div class="form-group"><label>벌점</label><input type="number" name="points" value="0" min="0" /></div>
      <div class="form-group"><label>상점</label><input type="number" name="merit_points" value="0" min="0" /></div>
    </div>
    <button type="submit" class="btn btn-primary">등록</button>
  </form>
</div>
{% endblock %}
